<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления — GTA5 RP</title>
    <style>
        :root {
            --bg-body: #0a0a0b; --bg-panel: #141416; --bg-header: #181818;
            --accent: #ff8c00; --discord: #5865F2; --text-main: #cecece;
            --text-white: #ffffff; --border: #27272a; --danger: #ef4444;
            --success: #10b981; --row-hover: #222222;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; font-size: 13px; }
        .hidden { display: none !important; }

        /* Вход */
        #login-overlay { position: fixed; inset: 0; background: var(--bg-body); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--bg-panel); padding: 40px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }

        /* Шапка */
        .admin-header { background: var(--bg-header); height: 65px; display: flex; align-items: center; padding: 0 40px; border-bottom: 2px solid var(--accent); justify-content: space-between; }
        .logo-area { font-weight: bold; color: var(--text-white); font-size: 1.2rem; }
        .logo-area span { color: var(--accent); }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--accent); }

        /* Сетка */
        .wrapper { padding: 25px 40px; display: grid; grid-template-columns: 280px 1fr; gap: 25px; }
        
        .nav-menu { display: flex; flex-direction: column; gap: 8px; }
        .nav-btn { background: transparent; border: 1px solid transparent; color: var(--text-main); padding: 12px; text-align: left; cursor: pointer; border-radius: 4px; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        .nav-btn.active { background: var(--bg-panel); border-color: var(--border); color: var(--accent); }

        .side-panel { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
        .btn-orange { background: var(--accent); color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 5px; }
        
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 10px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }

        .table-container { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .table-header { background: #222; padding: 12px 20px; font-weight: bold; display: flex; justify-content: space-between; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table td, .data-table th { padding: 12px 20px; border-bottom: 1px solid var(--border); text-align: left; }
        
        .badge { padding: 4px 8px; border-radius: 2px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-ban { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .status-clear { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }

        #reaction-area { width: 100%; height: 200px; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        #reaction-area.wait { background: var(--danger); }
        #reaction-area.ready { background: var(--success); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:white">GTA5 RP Admin</h2>
        <button class="btn-orange" onclick="discordLogin()" style="background:var(--discord); color:white; padding:15px">Войти через Discord</button>
    </div>
</div>

<div id="app" class="hidden">
    <header class="admin-header">
        <div class="logo-area">GTA<span>5</span> RP</div>
        <div id="userDisplay" style="display:flex; align-items:center; gap:10px"></div>
    </header>

    <div class="wrapper">
        <aside>
            <div class="nav-menu">
                <button class="nav-btn" id="btn-analyzer" onclick="showTab('analyzer')">🔍 Анализатор</button>
                <button class="nav-btn" id="btn-stats" onclick="showTab('stats')">📊 Статистика</button>
                <button class="nav-btn" id="btn-checks" onclick="showTab('checks')">⚖️ Проверки</button>
                <button class="nav-btn" id="btn-game" onclick="showTab('game')">⚡ Реакция</button>
            </div>
            <div class="side-panel" style="margin-top:20px" id="side-content"></div>
            <button onclick="logout()" style="width:100%; background:none; border:none; color:#444; margin-top:20px; cursor:pointer">ВЫХОД</button>
        </aside>

        <main id="main-content"></main>
    </div>
</div>

<script>
    const CLIENT_ID = '1490783084243587163';
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    let currentUser = null;
    let myStats = [], suspects = [];

    function discordLogin() {
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
    }

    window.onload = () => {
        const token = new URLSearchParams(window.location.hash.slice(1)).get('access_token');
        if (token) {
            fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } })
                .then(r => r.json()).then(user => {
                    localStorage.setItem('adm_user', JSON.stringify(user));
                    window.location.hash = '';
                    init(user);
                });
        } else {
            const saved = localStorage.getItem('adm_user');
            if (saved) init(JSON.parse(saved));
        }
    };

    function init(user) {
        currentUser = user;
        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('userDisplay').innerHTML = `<span>${user.username}</span><img src="https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png" class="user-avatar">`;
        
        myStats = JSON.parse(localStorage.getItem(user.id + '_stats') || '[]');
        suspects = JSON.parse(localStorage.getItem(user.id + '_suspects') || '[]');
        
        showTab('analyzer');
    }

    function showTab(name) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + name).classList.add('active');

        const main = document.getElementById('main-content');
        const side = document.getElementById('side-content');

        if (name === 'analyzer') {
            side.innerHTML = `<h3>Домены</h3><input type="text" id="domIn" placeholder="Домен..."><button class="btn-orange">Добавить</button>`;
            main.innerHTML = `<div class="table-container"><div class="table-header">Анализатор</div><div style="padding:40px; text-align:center; border:2px dashed #333">Нажмите для загрузки лога (.txt)</div></div>`;
        } 
        else if (name === 'stats') {
            side.innerHTML = `<h3>Новая смена</h3><input type="date" id="rD"><input type="number" id="rH" placeholder="Часы"><input type="number" id="rC" placeholder="Репорты"><button class="btn-orange" onclick="addStat()">Записать</button>`;
            renderStatsTable();
        }
        else if (name === 'checks') {
            side.innerHTML = `<h3>Внести игрока</h3><input type="text" id="sN" placeholder="Имя_Фамилия #ID"><textarea id="sR" placeholder="Причина..."></textarea><button class="btn-orange" onclick="addSus()">Добавить</button>`;
            renderSusTable();
        }
        else if (name === 'game') {
            side.innerHTML = `<h3>Тренировка</h3><p>Нажми на поле, когда оно станет зеленым.</p>`;
            main.innerHTML = `<div class="table-container" style="padding:20px"><div id="reaction-area" onclick="gameClick()">Нажми, чтобы начать</div></div>`;
        }
    }

    // --- СТАТИСТИКА ---
    function addStat() {
        const d = document.getElementById('rD').value, h = parseFloat(document.getElementById('rH').value), c = parseInt(document.getElementById('rC').value);
        if(d && h) { myStats.push({id:Date.now(), d, h, c}); save(); renderStatsTable(); }
    }
    function renderStatsTable() {
        const main = document.getElementById('main-content');
        let html = `<div class="table-container"><div class="table-header">История смен</div><table class="data-table">`;
        myStats.sort((a,b)=>new Date(b.d)-new Date(a.d)).forEach(s => {
            html += `<tr><td>${s.d}</td><td>${s.h}ч</td><td>${s.c}р</td><td><button onclick="delStat(${s.id})" style="color:red;background:none;border:none;cursor:pointer">✕</button></td></tr>`;
        });
        main.innerHTML = html + `</table></div>`;
    }

    // --- ПРОВЕРКИ ---
    function addSus() {
        const n = document.getElementById('sN').value;
        if(n) { suspects.push({id:Date.now(), date:new Date().toLocaleDateString(), name:n, status:'check'}); save(); renderSusTable(); }
    }
    function renderSusTable() {
        const main = document.getElementById('main-content');
        let html = `<div class="table-container"><div class="table-header">База проверок</div><table class="data-table"><thead><tr><th>Дата</th><th>Игрок</th><th>Статус</th><th>Действие</th></tr></thead>`;
        suspects.forEach(s => {
            html += `<tr><td>${s.date}</td><td><b>${s.name}</b></td>
            <td><span class="badge ${s.status==='ban'?'status-ban':'status-clear'}">${s.status}</span></td>
            <td>
                <select onchange="updateSus(${s.id}, this.value)" style="width:70px; font-size:10px"><option>...</option><option value="clear">Чист</option><option value="ban">Бан</option></select>
                <button onclick="delSus(${s.id})" style="color:red;background:none;border:none;margin-left:10px;cursor:pointer">✕</button>
            </td></tr>`;
        });
        main.innerHTML = html + `</table></div>`;
    }

    // --- ВСПОМОГАТЕЛЬНЫЕ ---
    function updateSus(id, val) { const s = suspects.find(x=>x.id===id); if(s){s.status=val; save(); renderSusTable();} }
    function delStat(id) { myStats = myStats.filter(x=>x.id!==id); save(); renderStatsTable(); }
    function delSus(id) { suspects = suspects.filter(x=>x.id!==id); save(); renderSusTable(); }
    function save() { 
        localStorage.setItem(currentUser.id + '_stats', JSON.stringify(myStats)); 
        localStorage.setItem(currentUser.id + '_suspects', JSON.stringify(suspects)); 
    }
    
    let gStat = 'idle', gTime;
    function gameClick() {
        const a = document.getElementById('reaction-area');
        if(gStat === 'idle') {
            gStat = 'wait'; a.innerText = 'ЖДИ...'; a.className = 'wait';
            setTimeout(() => { gStat = 'ready'; a.innerText = 'ЖМИ!'; a.className = 'ready'; gTime = Date.now(); }, Math.random()*2000 + 1000);
        } else if(gStat === 'ready') {
            a.innerText = (Date.now() - gTime) + 'ms'; gStat = 'idle'; a.className = '';
        }
    }
    function logout() { localStorage.removeItem('adm_user'); window.location.reload(); }
</script>
</body>
</html>
